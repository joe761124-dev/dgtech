<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>無人機足球 v0.33 (動態縮放與返回鍵修復版)</title>
    <style>
        /* --- 定義動態高度變數，由 JS 即時更新 --- */
        :root {
            --app-height: 100vh;
        }

        /* --- 基礎設定 --- */
        body, html { 
            margin: 0; padding: 0; 
            width: 100vw; height: var(--app-height); 
            background-color: #05050a; color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            overflow: hidden; touch-action: none; overscroll-behavior: none; 
            user-select: none; -webkit-user-select: none; -webkit-touch-callout: none;
            position: fixed; top: 0; left: 0; /* 防止任何原生的滑動回彈 */
        }
        
        canvas { 
            display: block; width: 100vw; height: var(--app-height); 
            position: absolute; top: 0; left: 0; z-index: 1; outline: none; 
        }
        
        #ui-layer { 
            position: absolute; top: 0; left: 0; width: 100vw; height: var(--app-height); 
            pointer-events: none; z-index: 10; display: flex; flex-direction: column; 
        }
        
        .btn { pointer-events: auto; cursor: pointer; transition: all 0.2s; text-align: center; border: none; outline: none; font-weight: bold; -webkit-tap-highlight-color: transparent; }
        .btn:active { transform: scale(0.95); }

        /* --- 開始畫面 --- */
        #start-screen { position: absolute; top: 0; left: 0; width: 100vw; height: var(--app-height); background: rgba(5, 5, 10, 0.95); z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .title { font-size: 50px; font-weight: 900; font-style: italic; color: #fff; text-shadow: 0 0 20px #44ff44; margin: 0 0 10px 0; text-transform: uppercase; letter-spacing: 2px; text-align: center;}
        .title span { color: #44ff44; }
        .subtitle { font-size: 13px; color: rgba(255,255,255,0.6); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 25px; font-weight: bold; text-align: center; padding: 0 20px;}
        
        .diff-selector { display: flex; align-items: center; gap: 8px; margin-bottom: 25px; pointer-events: auto; background: rgba(255,255,255,0.05); padding: 5px 15px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); flex-wrap: wrap; justify-content: center;}
        .diff-label { font-size: 13px; color: #aaa; font-weight: bold; }
        .btn-diff { background: transparent; color: #fff; border: 1px solid transparent; padding: 8px 16px; border-radius: 12px; font-size: 13px; cursor: pointer; transition: 0.3s; font-weight: bold; }
        .btn-diff.active { background: #ffaa00; color: #000; box-shadow: 0 0 15px rgba(255,170,0,0.5); }
        .btn-diff.active[data-level="easy"] { background: #44ff44; box-shadow: 0 0 15px rgba(68,255,68,0.5); }
        .btn-diff.active[data-level="hard"] { background: #ff4444; box-shadow: 0 0 15px rgba(255,68,68,0.5); color: #fff;}

        .btn-3v3 { background: #fff; color: #000; font-size: 18px; padding: 15px 40px; border-radius: 12px; margin-bottom: 12px; width: 260px; box-shadow: 0 0 20px rgba(255,255,255,0.2); }
        .btn-3v3:hover { background: #44ff44; box-shadow: 0 0 20px #44ff44; }
        .btn-practice { background: rgba(0,0,0,0.5); color: #fff; border: 1px solid rgba(255,255,255,0.2); font-size: 16px; padding: 15px 40px; border-radius: 12px; width: 260px; }
        .mobile-hint { color: #ffaa00; font-size: 12px; margin-top: -15px; margin-bottom: 15px; opacity: 0.9; font-weight: bold; background: rgba(255,170,0,0.2); padding: 5px 15px; border-radius: 10px;}

        /* --- 遊戲中 UI --- */
        #btn-back {
            position: absolute;
            top: max(10px, env(safe-area-inset-top));
            left: max(10px, env(safe-area-inset-left));
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 8px 15px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            pointer-events: auto;
            cursor: pointer;
            z-index: 50;
            display: none; /* 預設隱藏，遊戲開始才顯示 */
            align-items: center;
            gap: 5px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        #btn-back:hover { background: rgba(255, 255, 255, 0.2); }

        #top-bar { display: none; padding: 15px; pointer-events: none; }
        
        #fpv-scoreboard { 
            position: absolute; 
            /* 計分板往下推，讓出空間給左上角返回鍵 */
            top: calc(max(10px, env(safe-area-inset-top)) + 45px); 
            left: max(10px, env(safe-area-inset-left)); 
            pointer-events: none; border: 1px solid rgba(68, 255, 68, 0.4); background: rgba(68, 255, 68, 0.05); padding: 10px 15px; border-radius: 8px; box-shadow: 0 0 15px rgba(68,255,68,0.15); font-family: 'Courier New', Courier, monospace; backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
        }
        .fpv-score-row { display: flex; align-items: baseline; gap: 10px; margin-bottom: 3px; }
        .fpv-num { font-size: 22px; font-weight: bold; color: #44ff44; text-shadow: 0 0 8px #44ff44;}
        .fpv-score-red { color: #ff5555; text-shadow: 0 0 10px #ff5555;}
        .fpv-label { font-size: 10px; color: #44ff44; letter-spacing: 1px; }
        .fpv-timer { font-size: 16px; color: #44ff44; text-shadow: 0 0 5px #44ff44;}
        .timer-urgent { color: #ffaa00; text-shadow: 0 0 10px #ffaa00; animation: pulse 1s infinite; }
        #status-prompt { font-size: 10px; font-weight: bold; letter-spacing: 1px; color: #44ff44; margin-top: 8px; background: rgba(0,0,0,0.5); padding: 3px 8px; border-radius: 4px; display: inline-block;}
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        /* --- 結算畫面 --- */
        #gameover-screen { position: absolute; top: 0; left: 0; width: 100vw; height: var(--app-height); background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(15px); z-index: 100; display: none; flex-direction: column; justify-content: center; align-items: center; }
        .go-title { font-size: 40px; font-weight: 900; font-style: italic; text-transform: uppercase; margin-bottom: 5px; color: #ffaa00;}
        .final-score-box { display: flex; align-items: center; gap: 30px; margin-bottom: 40px; margin-top: 20px;}
        .fs-team { display: flex; flex-direction: column; align-items: center; }
        .fs-num { font-size: 60px; font-weight: 900; }
        .fs-label { font-size: 12px; font-weight: bold; letter-spacing: 2px; opacity: 0.7; margin-top: 5px; }
        .score-red { color: #ff5555; text-shadow: 0 0 15px rgba(255,85,85,0.7); }
        .score-blue { color: #5555ff; text-shadow: 0 0 15px rgba(85,85,255,0.7); }
        .score-dash { color: rgba(255,255,255,0.3); font-weight: 300; font-size: 24px; }
        .btn-restart { background: #fff; color: #000; padding: 15px 40px; font-size: 16px; border-radius: 30px; box-shadow: 0 0 30px rgba(255,255,255,0.3); }

        /* --- 虛擬搖桿 --- */
        .touch-ctrl { 
            position: absolute; width: 110px; height: 110px; 
            background: rgba(255,255,255,0.08); border: 2px solid rgba(255,255,255,0.15); 
            border-radius: 50%; pointer-events: auto; display: none; 
            /* 搖桿固定在動態高度的底部邊緣上方 */
            bottom: max(15px, env(safe-area-inset-bottom)); 
        }
        .touch-knob { position: absolute; top: 50%; left: 50%; width: 45%; height: 45%; background: rgba(255,255,255,0.6); border-radius: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 10px rgba(255,255,255,0.3); pointer-events: none;}
        
        #joy-left { left: max(20px, env(safe-area-inset-left)); }
        #joy-right { right: max(20px, env(safe-area-inset-right)); }
        
        #pc-hint { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); background: rgba(0, 0, 0, 0.6); border: 1px solid rgba(255, 255, 255, 0.1); font-size: 12px; color: rgba(255,255,255,0.5); letter-spacing: 1px; padding: 8px 20px; border-radius: 20px; pointer-events: none; display: none;}

        @media (max-width: 850px) {
            .touch-ctrl { display: block; } 
            #pc-hint { display: none !important; }
            .title { font-size: 40px; }
            /* 手機版計分板微調大小 */
            #fpv-scoreboard { transform: scale(0.85); transform-origin: top left; top: calc(max(10px, env(safe-area-inset-top)) + 45px); }
        }
        @media (min-width: 851px) { #pc-hint { display: block; } }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <canvas id="game-canvas"></canvas>

    <div id="start-screen">
        <h1 class="title">無人機<span>足球</span></h1>
        <div class="mobile-hint">📍 畫面已鎖死動態範圍，保證不吃搖桿</div>
        <div class="subtitle">v0.33 | 崩潰修復、返回鍵與動態縮放</div>
        
        <div class="diff-selector">
            <span class="diff-label">AI 難度：</span>
            <button class="btn btn-diff" data-level="easy" onclick="setDifficulty('easy')">簡單</button>
            <button class="btn btn-diff" data-level="medium" onclick="setDifficulty('medium')">普通</button>
            <button class="btn btn-diff active" data-level="hard" onclick="setDifficulty('hard')">困難</button>
        </div>

        <button class="btn btn-3v3" onclick="startGame('3v3')">3V3 競賽模式</button>
        <button class="btn btn-practice" onclick="startGame('practice')">單人練習模式</button>
    </div>

    <div id="ui-layer">
        <button id="btn-back" class="btn" onclick="returnToMenu()">◀ 返回主選單</button>

        <div id="top-bar">
            <div id="fpv-scoreboard">
                <div class="fpv-score-row">
                    <span class="fpv-num fpv-score-red" id="score-red">00</span>
                    <span class="fpv-label">紅隊 / RED</span>
                </div>
                <div class="fpv-score-row" id="fpv-blue-row">
                    <span class="fpv-num" id="score-blue" style="color: #5555ff; text-shadow: 0 0 10px #5555ff;">00</span>
                    <span class="fpv-label" style="color: #5555ff;">藍隊 / BLU</span>
                </div>
                <div class="fpv-score-row" style="margin-top: 8px;">
                    <span class="fpv-timer" id="timer">03:00</span>
                    <span class="fpv-label">時間 / TIME</span>
                </div>
                <div id="status-prompt">🟢 可以進攻 STATUS: OK</div>
            </div>
        </div>

        <div id="joy-left" class="touch-ctrl"><div id="knob-left" class="touch-knob"></div></div>
        <div id="joy-right" class="touch-ctrl"><div id="knob-right" class="touch-knob"></div></div>
        <div id="pc-hint">【美國手 Mode 2】 左手 WASD：升降與轉向 | 右手 方向鍵：推飛平移</div>
    </div>

    <div id="gameover-screen">
        <div class="go-title text-yellow">MATCH END</div>
        <div class="final-score-box">
            <div class="fs-team">
                <div class="fs-num score-red" id="final-red">0</div>
                <div class="fs-label" style="color: #ff5555;">紅隊</div>
            </div>
            <div class="score-dash" id="final-dash">VS</div>
            <div class="fs-team" id="final-blue-container">
                <div class="fs-num score-blue" id="final-blue">0</div>
                <div class="fs-label" style="color: #5555ff;">藍隊</div>
            </div>
        </div>
        <button class="btn btn-restart" onclick="returnToMenu()">返回主選單</button>
    </div>

<script>
    // --- 【動態高度適應】強制鎖死真實可用高度 ---
    function updateAppHeight() {
        const realHeight = window.innerHeight;
        // 把取得的真實高度傳給 CSS 變數
        document.documentElement.style.setProperty('--app-height', `${realHeight}px`);
        
        // 確保 3D 畫布同步更新比例
        if (camera && renderer) {
            camera.aspect = window.innerWidth / realHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, realHeight);
        }
    }
    // 監聽視窗變化與手機旋轉
    window.addEventListener('resize', updateAppHeight);
    window.addEventListener('orientationchange', () => setTimeout(updateAppHeight, 200)); 
    updateAppHeight(); 

    // --- 音效系統 ---
    const sfxScore = new Audio('https://assets.mixkit.co/sfx/preview/mixkit-arcade-game-jump-coin-216.mp3');
    const sfxHit = new Audio('https://assets.mixkit.co/sfx/preview/mixkit-metal-hit-clank-2144.mp3');
    sfxScore.volume = 0.5; sfxHit.volume = 0.4;
    function playSound(audioObj) {
        if(audioObj.readyState >= 2) { audioObj.currentTime = 0; audioObj.play().catch(e => {}); }
    }

    // --- 遊戲常數 (FAI F9A-B 20cm 級) ---
    const PITCH = { w: 800, h: 300, d: 400 }; 
    const DRONE_RADIUS = 10; 
    const GOAL_INNER_RADIUS = 20; 
    const GOAL_TUBE_RADIUS = 3; 
    const TORUS_RADIUS = GOAL_INNER_RADIUS + GOAL_TUBE_RADIUS; 
    const GOAL_Y = 150; 
    const GOAL_X = PITCH.w / 2 - 100; 

    // --- AI 難易度 ---
    const DIFFICULTY_SETTINGS = {
        'easy': { speedBase: 0.35, speedBurst: 0.5, sweepRange: 5, lerpFactor: 0.15 },
        'medium': { speedBase: 0.45, speedBurst: 0.65, sweepRange: 15, lerpFactor: 0.25 },
        'hard': { speedBase: 0.55, speedBurst: 0.8, sweepRange: 25, lerpFactor: 0.4 }
    };
    let currentDifficulty = 'hard';

    function setDifficulty(level) {
        currentDifficulty = level;
        document.querySelectorAll('.btn-diff').forEach(btn => {
            if(btn.dataset.level === level) btn.classList.add('active');
            else btn.classList.remove('active');
        });
    }

    // --- 全域變數 ---
    const canvas = document.getElementById('game-canvas');
    let scene, camera, renderer, clock;
    let drones = [];
    let player = null;
    let gameMode = '3v3';
    let gameState = 'menu'; 
    let timeLeft = 180;
    let score = { red: 0, blue: 0 };
    let animationFrameId;
    let gameTimerId;

    const keys = { w:false, a:false, s:false, d:false, arrowup:false, arrowdown:false, arrowleft:false, arrowright:false };
    const joyLeft = { x: 0, y: 0 };
    const joyRight = { x: 0, y: 0 };

    // --- 實體：無人機 ---
    class Drone {
        constructor(x, y, z, colorHex, role, team) {
            this.p = new THREE.Vector3(x, y, z);
            this.prevP = new THREE.Vector3(x, y, z);
            this.v = new THREE.Vector3(0, 0, 0);
            this.yaw = team === 'red' ? -Math.PI / 2 : Math.PI / 2;
            this.radius = DRONE_RADIUS;
            this.mass = 1.0;
            this.team = team;
            this.role = role;
            this.speed = 1200;
            this.yawSpeed = 3.5;
            this.friction = 0.94;
            this.needsReset = false;
            this.stunTimer = 0;
            this.angularVelocity = new THREE.Vector3();

            this.group = new THREE.Group();
            this.group.position.copy(this.p);
            this.group.rotation.y = this.yaw;

            const cageMat = new THREE.MeshStandardMaterial({ 
                color: 0xcccccc, wireframe: true, transparent: true, opacity: 0.8,
                emissive: team === 'red' ? 0xaa0000 : 0x0000aa, emissiveIntensity: 0.5
            });
            this.cageMesh = new THREE.Mesh(new THREE.IcosahedronGeometry(this.radius, 2), cageMat);
            this.group.add(this.cageMesh);

            const coreMat = new THREE.MeshStandardMaterial({ color: colorHex, emissive: colorHex, emissiveIntensity: 1.0, metalness: 0.8, roughness: 0.2 });
            this.coreMesh = new THREE.Mesh(new THREE.SphereGeometry(4, 16, 16), coreMat);
            this.group.add(this.coreMesh);

            const numLEDs = 14;
            const ringRadius = this.radius + 0.5;
            for (let i = 0; i < numLEDs; i++) {
                const theta = i * (Math.PI * 2 / numLEDs);
                const lx = Math.sin(theta) * ringRadius;
                const lz = -Math.cos(theta) * ringRadius;
                const isBackLED = i >= 5 && i <= 9;
                const ledColor = team === "red" ? (isBackLED ? 0x5555ff : 0xff5555) : (isBackLED ? 0xff5555 : 0x5555ff);
                const ledMesh = new THREE.Mesh(new THREE.SphereGeometry(1.2, 8, 8), new THREE.MeshBasicMaterial({ color: ledColor }));
                ledMesh.position.set(lx, 0, lz);
                this.group.add(ledMesh);
            }

            if (role === 'striker') {
                this.indicator = new THREE.Mesh(new THREE.SphereGeometry(2.5, 8, 8), new THREE.MeshBasicMaterial({ color: 0xffffff }));
                this.indicator.position.y = 13;
                this.group.add(this.indicator);
            }

            scene.add(this.group);
        }

        update(dt) {
            this.prevP.copy(this.p);
            if (this.stunTimer > 0) this.stunTimer -= dt;

            this.v.multiplyScalar(this.friction);
            this.p.addScaledVector(this.v, dt);

            if (this.p.x - this.radius < -PITCH.w / 2) { this.p.x = -PITCH.w / 2 + this.radius; this.v.x *= -0.7; this.stunTimer = 0.1; }
            if (this.p.x + this.radius > PITCH.w / 2) { this.p.x = PITCH.w / 2 - this.radius; this.v.x *= -0.7; this.stunTimer = 0.1; }
            if (this.p.y - this.radius < 0) { this.p.y = this.radius; this.v.y *= -0.7; this.stunTimer = 0.1; }
            if (this.p.y + this.radius > PITCH.h) { this.p.y = PITCH.h - this.radius; this.v.y *= -0.7; this.stunTimer = 0.1; }
            if (this.p.z - this.radius < -PITCH.d / 2) { this.p.z = -PITCH.d / 2 + this.radius; this.v.z *= -0.7; this.stunTimer = 0.1; }
            if (this.p.z + this.radius > PITCH.d / 2) { this.p.z = PITCH.d / 2 - this.radius; this.v.z *= -0.7; this.stunTimer = 0.1; }

            this.group.position.copy(this.p);
            this.group.rotation.y = this.yaw;

            if (this.v.length() > 5 && this.angularVelocity.lengthSq() < 1) {
                const axis = new THREE.Vector3(this.v.z, 0, -this.v.x).normalize();
                this.cageMesh.rotateOnWorldAxis(axis, this.v.length() * dt * 0.04);
            }
            if (this.angularVelocity.lengthSq() > 0.01) {
                this.cageMesh.rotation.x += this.angularVelocity.x * dt;
                this.cageMesh.rotation.y += this.angularVelocity.y * dt;
                this.cageMesh.rotation.z += this.angularVelocity.z * dt;
                this.angularVelocity.multiplyScalar(0.9);
            }

            if (this.indicator) this.indicator.material.color.setHex(this.needsReset ? 0x444444 : 0xffffff);
        }
    }

    function initThreeJS() {
        scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x05050a, 600, 2500);

        camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 3000);
        camera.position.set(-PITCH.w / 2 - 150, 160, 0); 
        camera.lookAt(-100, 100, 0); 

        renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: true });
        // 使用真實高度來初始化
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setClearColor(0x000000, 0);

        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const pointLight = new THREE.PointLight(0xffffff, 1.5, 1500);
        pointLight.position.set(0, PITCH.h + 100, 0);
        scene.add(pointLight);

        const floor = new THREE.Mesh(new THREE.PlaneGeometry(PITCH.w, PITCH.d), new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.8 }));
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        const grid = new THREE.GridHelper(1000, 20, 0x44ff44, 0x222222);
        grid.position.y = 0.1;
        scene.add(grid);

        const netMesh = new THREE.Mesh(new THREE.BoxGeometry(PITCH.w, PITCH.h, PITCH.d), new THREE.MeshBasicMaterial({ color: 0x445544, wireframe: true, transparent: true, opacity: 0.15 }));
        netMesh.position.y = PITCH.h / 2;
        scene.add(netMesh);

        const createGoal = (pos, colorHex) => {
            const mesh = new THREE.Mesh(new THREE.TorusGeometry(TORUS_RADIUS, GOAL_TUBE_RADIUS, 16, 100), new THREE.MeshStandardMaterial({ color: colorHex, emissive: colorHex, emissiveIntensity: 2.0 }));
            mesh.position.copy(pos);
            mesh.rotation.y = Math.PI / 2;
            scene.add(mesh);
            const light = new THREE.PointLight(colorHex, 2, 150);
            light.position.copy(pos);
            scene.add(light);
        };
        createGoal(new THREE.Vector3(-GOAL_X, GOAL_Y, 0), 0xff3333);
        createGoal(new THREE.Vector3(GOAL_X, GOAL_Y, 0), 0x3333ff);

        clock = new THREE.Clock();
    }

    function updateUI() {
        document.getElementById('score-red').innerText = score.red.toString().padStart(2, '0');
        document.getElementById('score-blue').innerText = score.blue.toString().padStart(2, '0');
        
        let m = Math.floor(timeLeft / 60);
        let s = Math.floor(timeLeft % 60);
        const timerEl = document.getElementById('timer');
        timerEl.innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        
        if (timeLeft <= 30 && timeLeft > 0) timerEl.classList.add('timer-urgent');
        else timerEl.classList.remove('timer-urgent');

        const promptEl = document.getElementById('status-prompt');
        if (player && player.needsReset) {
            promptEl.innerText = "⚠️ 已得分，請回中場重置 RESET REQ";
            promptEl.style.color = "#ffaa00";
            promptEl.style.background = "rgba(255,170,0,0.2)";
        } else {
            promptEl.innerText = "🟢 可以進攻 STATUS: OK";
            promptEl.style.color = "#44ff44";
            promptEl.style.background = "rgba(0,0,0,0.5)";
        }
    }

    // --- 【修復】安全觸發全螢幕，防止舊版 Safari 報錯死機 ---
    function requestFullScreen() {
        const el = document.documentElement;
        const requestFS = el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen;
        
        if (requestFS) {
            try {
                const promise = requestFS.call(el);
                if (promise && promise.catch) {
                    promise.catch(e => console.log("全螢幕被阻擋:", e));
                }
            } catch(e) {
                console.log("舊版全螢幕執行:", e);
            }
        }
        // 確保視窗高度有更新
        setTimeout(updateAppHeight, 100);
    }

    // --- 物理系統 ---
    function resolveCollision(d1, d2) {
        const diff = new THREE.Vector3().subVectors(d2.p, d1.p);
        const dist = diff.length();
        const minDist = d1.radius + d2.radius;
        if (dist < minDist && dist > 0) {
            let normal = diff.clone().normalize();
            normal.x += (Math.random() - 0.5) * 0.4; normal.y += (Math.random() - 0.5) * 0.4; normal.z += (Math.random() - 0.5) * 0.4;
            normal.normalize();

            const totalMass = d1.mass + d2.mass;
            d1.p.addScaledVector(normal, -(minDist - dist) * (d2.mass / totalMass));
            d2.p.addScaledVector(normal, (minDist - dist) * (d1.mass / totalMass));
            
            const speed = new THREE.Vector3().subVectors(d1.v, d2.v).dot(normal);
            const impulse = (1 + 0.8) * Math.max(speed, 350) / (1/d1.mass + 1/d2.mass);
            
            d1.v.addScaledVector(normal, -impulse / d1.mass);
            d2.v.addScaledVector(normal, impulse / d2.mass);
            d1.stunTimer = 0.25; d2.stunTimer = 0.25;
            
            d1.angularVelocity.set(Math.random()-0.5, Math.random()-0.5, Math.random()-0.5).multiplyScalar(15);
            d2.angularVelocity.set(Math.random()-0.5, Math.random()-0.5, Math.random()-0.5).multiplyScalar(15);
            playSound(sfxHit);
        }
    }

    function resolveGoalCollision(drone, gX, gY, gZ) {
        const dx = drone.p.x - gX; const dy = drone.p.y - gY; const dz = drone.p.z - gZ;
        const distYZ = Math.hypot(dy, dz);
        const closestY = distYZ > 0 ? (dy / distYZ) * TORUS_RADIUS : TORUS_RADIUS;
        const closestZ = distYZ > 0 ? (dz / distYZ) * TORUS_RADIUS : 0;
        const distToRing = Math.hypot(dx, dy - closestY, dz - closestZ);
        
        if (distToRing < drone.radius + GOAL_TUBE_RADIUS && distToRing > 0) {
            const nx = dx / distToRing; const ny = (dy - closestY) / distToRing; const nz = (dz - closestZ) / distToRing;
            drone.p.x += nx * ((drone.radius + GOAL_TUBE_RADIUS) - distToRing);
            drone.p.y += ny * ((drone.radius + GOAL_TUBE_RADIUS) - distToRing);
            drone.p.z += nz * ((drone.radius + GOAL_TUBE_RADIUS) - distToRing);

            let normal = new THREE.Vector3(nx, ny, nz);
            normal.x += (Math.random() - 0.5) * 0.2; normal.normalize();

            drone.v.addScaledVector(normal, (1 + 0.6) * Math.max(-drone.v.dot(normal), 400));
            drone.stunTimer = 0.2;
            drone.angularVelocity.set(Math.random()-0.5, Math.random()-0.5, Math.random()-0.5).multiplyScalar(20);
            playSound(sfxHit);
        }
    }

    function applyAerodynamics(d1, d2, dt) {
        let dy = d2.p.y - d1.p.y;
        if (dy < 0 && dy > -150) { 
            let distXZ = Math.hypot(d2.p.x - d1.p.x, d2.p.z - d1.p.z);
            let coneRadius = 20 + Math.abs(dy) * 0.3; 
            if (distXZ < coneRadius) {
                let intensity = 1.0 - (Math.abs(dy) / 150);
                let downwashForce = 1500 * intensity * dt; 
                d2.v.y -= downwashForce;
                if (distXZ > 1.0) {
                    let scatterForce = downwashForce * 0.25;
                    d2.v.x += ((d2.p.x - d1.p.x) / distXZ) * scatterForce;
                    d2.v.z += ((d2.p.z - d1.p.z) / distXZ) * scatterForce;
                }
                d2.angularVelocity.x += (Math.random() - 0.5) * 5 * dt;
                d2.angularVelocity.z += (Math.random() - 0.5) * 5 * dt;
            }
        }
    }

    // --- 主渲染迴圈 ---
    function animate() {
        if (gameState !== 'playing') {
            clock.getDelta(); 
            renderer.render(scene, camera);
            animationFrameId = requestAnimationFrame(animate);
            return;
        }

        const dt = Math.min(clock.getDelta(), 0.1);

        if (player && player.stunTimer <= 0) {
            let yawInput = (keys["a"] ? 1 : 0) + (keys["d"] ? -1 : 0) - joyLeft.x;
            player.yaw += yawInput * player.yawSpeed * dt;
            let throttleInput = (keys["w"] ? 1 : 0) + (keys["s"] ? -1 : 0) + joyLeft.y;
            player.v.y += throttleInput * player.speed * dt;
            
            let pitchInput = (keys["arrowup"] ? 1 : 0) + (keys["arrowdown"] ? -1 : 0) + joyRight.y;
            let rollInput = (keys["arrowleft"] ? -1 : 0) + (keys["arrowright"] ? 1 : 0) + joyRight.x;

            player.v.addScaledVector(new THREE.Vector3(-Math.sin(player.yaw), 0, -Math.cos(player.yaw)).normalize(), pitchInput * player.speed * dt);
            player.v.addScaledVector(new THREE.Vector3(Math.cos(player.yaw), 0, -Math.sin(player.yaw)).normalize(), rollInput * player.speed * dt);
        }

        const timeNow = performance.now();
        const goalPosRed = new THREE.Vector3(-GOAL_X, GOAL_Y, 0);
        const goalPosBlue = new THREE.Vector3(GOAL_X, GOAL_Y, 0);
        const diffConfig = DIFFICULTY_SETTINGS[currentDifficulty];

        drones.forEach(d => {
            if (d === player || d.stunTimer > 0) return;
            
            if (d.role === "defender") {
                const enemyStriker = drones.find(ed => ed.team !== d.team && ed.role === "striker");
                if (enemyStriker) {
                    let target = new THREE.Vector3().copy(d.team === "red" ? goalPosRed : goalPosBlue).lerp(enemyStriker.p, diffConfig.lerpFactor);
                    target.z += Math.sin(timeNow * 0.003 + d.p.x) * diffConfig.sweepRange; 
                    target.y += Math.cos(timeNow * 0.004 + d.p.y) * diffConfig.sweepRange;
                    const dir = new THREE.Vector3().subVectors(target, d.p);
                    if (dir.length() > 10) {
                        let defSpeedMult = (enemyStriker.p.distanceTo(d.team === "red" ? goalPosRed : goalPosBlue) < 150) ? diffConfig.speedBurst : diffConfig.speedBase;
                        d.v.addScaledVector(dir.normalize(), d.speed * dt * defSpeedMult);
                        d.yaw = Math.atan2(-dir.x, -dir.z);
                    }
                }
            } else if (d.role === "striker") {
                let target = new THREE.Vector3();
                if (d.needsReset) target.set(d.team === "red" ? -200 : 200, GOAL_Y, 0);
                else target.copy(d.team === "red" ? goalPosBlue : goalPosRed);
                
                let dir = new THREE.Vector3().subVectors(target, d.p).normalize();
                let speedMult = diffConfig.speedBase; 
                
                if (!d.needsReset) {
                    let closestDef = null, minDefDist = Infinity;
                    drones.forEach(other => { if (other.team !== d.team && other.role === 'defender' && d.p.distanceTo(other.p) < minDefDist) { minDefDist = d.p.distanceTo(other.p); closestDef = other; }});
                    
                    let evasionDist = currentDifficulty === 'easy' ? 100 : 150;
                    if (closestDef && minDefDist < evasionDist && dir.dot(new THREE.Vector3().subVectors(closestDef.p, d.p).normalize()) > 0.5) {
                        if (d.p.distanceTo(target) < 200) {
                            speedMult = diffConfig.speedBurst + 0.2; 
                            if (d.v.length() < 300) { 
                                let slipDir = new THREE.Vector3().crossVectors(new THREE.Vector3().subVectors(closestDef.p, d.p).normalize(), new THREE.Vector3(0,1,0)).normalize();
                                if (Math.sin(timeNow * 0.005) > 0) slipDir.negate();
                                dir.addScaledVector(slipDir, 1.5); dir.y += Math.cos(timeNow * 0.006) * 1.5; dir.normalize();
                            }
                        } else {
                            let lateralVec = new THREE.Vector3().crossVectors(new THREE.Vector3().subVectors(closestDef.p, d.p).normalize(), new THREE.Vector3(0,1,0)).normalize();
                            if (new THREE.Vector3().subVectors(d.p, closestDef.p).dot(lateralVec) < 0) lateralVec.negate();
                            dir.addScaledVector(lateralVec, 1.2).normalize();
                            dir.y += d.p.y < closestDef.p.y ? -0.5 : 0.5; dir.normalize();
                        }
                    }
                }
                d.v.addScaledVector(dir, d.speed * dt * speedMult); 
                d.yaw = Math.atan2(-dir.x, -dir.z);
            }
        });

        for (let i = 0; i < drones.length; i++) {
            const d1 = drones[i];
            d1.update(dt);
            for (let j = i + 1; j < drones.length; j++) {
                const d2 = drones[j];
                resolveCollision(d1, d2);
                applyAerodynamics(d1, d2, dt);
                applyAerodynamics(d2, d1, dt);
            }
            resolveGoalCollision(d1, -GOAL_X, GOAL_Y, 0);
            resolveGoalCollision(d1, GOAL_X, GOAL_Y, 0);

            if (d1.role === "striker" && !d1.needsReset) {
                const tX = d1.team === "red" ? GOAL_X : -GOAL_X;
                const crossed = d1.team === "red" ? (d1.prevP.x <= tX && d1.p.x > tX) : (d1.prevP.x >= tX && d1.p.x < tX);
                if (crossed && Math.hypot(d1.p.y - GOAL_Y, d1.p.z - 0) < GOAL_INNER_RADIUS) {
                    d1.needsReset = true; playSound(sfxScore);
                    if (d1.team === "red") score.red++; else score.blue++;
                }
            }
            if (d1.role === "striker" && d1.needsReset && ((d1.team === "red" && d1.p.x < 0) || (d1.team === "blue" && d1.p.x > 0))) d1.needsReset = false;
        }

        updateUI();
        renderer.render(scene, camera);
        animationFrameId = requestAnimationFrame(animate);
    }

    function startGame(mode) {
        requestFullScreen();
        gameMode = mode;
        gameState = 'playing';
        score = { red: 0, blue: 0 };
        timeLeft = 180;
        
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('gameover-screen').style.display = 'none';
        document.getElementById('top-bar').style.display = 'block';
        document.getElementById('btn-back').style.display = 'flex'; // 顯示返回鍵
        
        if (mode === 'practice') document.getElementById('fpv-blue-row').style.display = 'none';
        else document.getElementById('fpv-blue-row').style.display = 'flex';

        // 清除場上殘留無人機
        drones.forEach(d => scene.remove(d.group));
        drones = [];

        player = new Drone(-GOAL_X - 50, 30, 0, 0xff5555, 'striker', 'red');
        drones.push(player);
        
        if (mode === '3v3') {
            drones.push(new Drone(-GOAL_X - 50, 30, 80, 0xff5555, 'defender', 'red'));
            drones.push(new Drone(-GOAL_X - 50, 30, -80, 0xff5555, 'defender', 'red'));
            drones.push(new Drone(GOAL_X + 50, 30, 0, 0x5555ff, 'striker', 'blue'));
            drones.push(new Drone(GOAL_X + 50, 30, 80, 0x5555ff, 'defender', 'blue'));
            drones.push(new Drone(GOAL_X + 50, 30, -80, 0x5555ff, 'defender', 'blue'));
        }

        clearInterval(gameTimerId);
        gameTimerId = setInterval(() => {
            timeLeft--;
            if(timeLeft <= 0) gameOver();
        }, 1000);
        
        clock.start();
    }

    function gameOver() {
        gameState = 'gameover';
        clearInterval(gameTimerId);
        document.getElementById('top-bar').style.display = 'none';
        document.getElementById('btn-back').style.display = 'none'; 
        document.getElementById('gameover-screen').style.display = 'flex';
        document.getElementById('final-red').innerText = score.red.toString().padStart(2, '0');
        document.getElementById('final-blue').innerText = score.blue.toString().padStart(2, '0');
        
        if (gameMode === 'practice') {
            document.getElementById('final-dash').style.display = 'none';
            document.getElementById('final-blue-container').style.display = 'none';
        } else {
            document.getElementById('final-dash').style.display = 'block';
            document.getElementById('final-blue-container').style.display = 'flex';
        }
    }

    // --- 【新增】返回主選單邏輯 ---
    function returnToMenu() {
        gameState = 'menu';
        clearInterval(gameTimerId); // 停止計時
        document.getElementById('gameover-screen').style.display = 'none';
        document.getElementById('top-bar').style.display = 'none';
        document.getElementById('btn-back').style.display = 'none';
        document.getElementById('start-screen').style.display = 'flex';
        
        // 刪除畫面上的無人機模型
        drones.forEach(d => scene.remove(d.group));
        drones = [];
        player = null;
    }

    // --- 搖桿與事件綁定 ---
    function setupJoy(zoneId, knobId, outObj) {
        const zone = document.getElementById(zoneId);
        const knob = document.getElementById(knobId);
        let touchId = null;

        const update = (touch) => {
            const rect = zone.getBoundingClientRect(); // 即時取得邊界，無視動態縮放誤差
            let dx = touch.clientX - (rect.left + rect.width/2);
            let dy = touch.clientY - (rect.top + rect.height/2);
            const maxDist = rect.width/2;
            const dist = Math.hypot(dx, dy);
            if(dist > maxDist) { dx = (dx/dist)*maxDist; dy = (dy/dist)*maxDist; }
            knob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
            outObj.x = dx / maxDist; outObj.y = -dy / maxDist;
        };

        zone.addEventListener('touchstart', e => { if(e.cancelable) e.preventDefault(); touchId = e.changedTouches[0].identifier; update(e.changedTouches[0]); }, {passive: false});
        zone.addEventListener('touchmove', e => { if(e.cancelable) e.preventDefault(); for(let t of e.changedTouches) if(t.identifier === touchId) update(t); }, {passive: false});
        const reset = () => { touchId = null; knob.style.transform = `translate(-50%, -50%)`; outObj.x = 0; outObj.y = 0; };
        zone.addEventListener('touchend', reset); zone.addEventListener('touchcancel', reset);
    }

    setupJoy('joy-left', 'knob-left', joyLeft);
    setupJoy('joy-right', 'knob-right', joyRight);

    // 啟動
    initThreeJS();
    animate();

</script>
